<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Cobra head shield -->
  <defs>
    <linearGradient id="cobraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cc0000;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield background -->
  <path d="M 50 10 L 90 30 L 85 80 Q 50 95 50 95 Q 50 95 15 80 L 10 30 Z" fill="url(#cobraGrad)" stroke="#000" stroke-width="1"/>
  
  <!-- Cobra eyes (red) -->
  <circle cx="40" cy="45" r="4" fill="#ff0000"/>
  <circle cx="60" cy="45" r="4" fill="#ff0000"/>
  
  <!-- Cobra mouth -->
  <path d="M 45 55 Q 50 60 55 55" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Cobra fangs -->
  <path d="M 43 58 L 40 65" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 57 58 L 60 65" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
</svg>
